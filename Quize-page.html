<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question & Answers page</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div id="quiz-app-header">
            <div>
                <img src="assets/images/techpaathshala-logo.svg" alt="techpaathshala-logo">
            </div>
            <div id="header-list">
                <ul>
                    <li>Hello</li>
                    <li id="show-user-name"></li>
                </ul>
                <img src="assets/images/header-image.svg" alt="image" onclick="UsersLogOut()">
            </div>
        </div>
        <div id="logout-container" class="logout-container">
            <div>
                <i class="fa-solid fa-sort-up"></i>
                <p id="logedinuser-firstname"></p>
                <p id="current-user-name"></p>
                <p id="current-user-email"></p>
                <button type="button" id="logOut-btn" onclick="logOut()">Log out</button>
            </div>
        </div>
    </header>
    <main>
        <section>
            <div id="q-a-section">
                <div>
                    <div>
                        <h2 id="countQuestions">Question <span id="countQue">1</span> of 10</h2>
                        <h2 id="displayTime">00:00</h2>
                    </div>
                    <div id="progress-bar"><span id="progress-percentage"></span></div>
                </div>
                <div id="questions">
                    <h3>
                        <span id="countNum">1. </span>
                        <span id="quizes"></span>
                    </h3>
                    <!--<p>Supporting Text</p>-->
                </div>
                <div id="second-ol-list">
                    <ol>
                        <li class="radio-buttons"><input type="radio" name="answer" id="option1"
                                onclick="choosedAnswer(0)">
                            <label for="option1" class="option">1.<span id="option-1"> option<span></label>
                        </li>
                        <li class="radio-buttons"><input type="radio" name="answer" id="option2"
                                onclick="choosedAnswer(1)">
                            <label for="option2" class="option">2.<span id="option-2">option</span></label>
                        </li>
                        <li class="radio-buttons"><input type="radio" name="answer" id="option3"
                                onclick="choosedAnswer(2)">
                            <label for="option3" class="option">3.<span id="option-3">option</span></label>
                        </li>
                        <li class="radio-buttons"><input type="radio" name="answer" id="option4"
                                onclick="choosedAnswer(3)">
                            <label for="option4" class="option">4.<span id="option-4">option</span></label>
                        </li>
                    </ol>
                </div>
                <div id="previos-and-next-button">
                    <button type="button" id="previous-btn" onclick="goToPrevious()"><img
                            src="assets/images/left-arrow.svg" alt="left-arrow" id="left-arrow">Previous</button>
                    <button type="button" id="next-btn" onclick="goToNext()"> Next <img
                            src="assets/images/right-arrow.svg" alt="right-arrow" id="right-arrow"></button>
                    <!-- Suggest a Question -->
<div style="margin-top:18px; text-align:center;">
    <button type="button" onclick="openSuggestForm()" 
      style="background:transparent; color:#667eea; border:2px solid #667eea; 
             padding:32px 25px; border-radius:20px; cursor:pointer; font-size:25px; font-weight:600;">
        💡 Suggest a Question
    </button>
</div>

<!-- Suggest Form (hidden by default) -->
<div id="suggest-form" style="display:none; background:#f7f7fb; border:1px solid #ddd; 
     padding:18px; border-radius:10px; margin-top:12px; text-align:left;">
    <p style="font-weight:bold; margin-bottom:10px; color:#333;">📝 Submit a Question Suggestion</p>
    <input id="sug-question" type="text" placeholder="Enter your question..." 
           style="width:100%; padding:8px; margin-bottom:8px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;">
        <input id="sug-opt1" type="text" placeholder="Option 1" style="flex:1; min-width:140px; padding:7px; border-radius:6px; border:1px solid #ccc;">
        <input id="sug-opt2" type="text" placeholder="Option 2" style="flex:1; min-width:140px; padding:7px; border-radius:6px; border:1px solid #ccc;">
        <input id="sug-opt3" type="text" placeholder="Option 3" style="flex:1; min-width:140px; padding:7px; border-radius:6px; border:1px solid #ccc;">
        <input id="sug-opt4" type="text" placeholder="Option 4" style="flex:1; min-width:140px; padding:7px; border-radius:6px; border:1px solid #ccc;">
    </div>
    <input id="sug-answer" type="text" placeholder="Correct answer (must match one option exactly)" 
           style="width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">
    <button onclick="submitSuggestion()" style="background:#667eea; color:white; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-weight:600;">Submit</button>
    <button onclick="closeSuggestForm()" style="background:#aaa; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-left:8px;">Cancel</button>
</div>
                </div>
            </div>
        </section>
    </main>
    <script src="assets/script.js"></script>
    <script>
        displayQuestion();
        userName();
        LoggedInUserFirstLetter()
        startTime()
    </script>
</body>

</html>
